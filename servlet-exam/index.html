<!DOCTYPE html>
<html>
<head>
    <title>User Details Form</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 40px; }
        .form-container { width: 300px; padding: 20px; border: 1px solid #ccc; border-radius: 5px; }
        input { width: 100%; margin-bottom: 15px; padding: 8px; box-sizing: border-box; }
        input[type="submit"] { background-color: #2563eb; color: white; border: none; cursor: pointer; }
    </style>
</head>
<body>
    <h2>Enter User Details</h2>
    <div class="form-container">
        <form action="UserServlet" method="POST">
            <label>Name:</label>
            <input type="text" name="userName" required>
            
            <label>Email:</label>
            <input type="email" name="userEmail" required>
            
            <label>Age:</label>
            <input type="number" name="userAge" required>
            
            <label>City:</label>
            <input type="text" name="userCity" required>
            
            <input type="submit" value="Submit Details">
        </form>
    </div>

    <div style="position: fixed; bottom: 0; left: 0; width: 100%; padding: 15px; background: white; text-align: center; font-weight: bold; color: #666; border-top: 1px solid #ccc; z-index: 100;">
        24071A05M1 || THURUPATI RENU MANEESH
    </div>
</body>
</html>
